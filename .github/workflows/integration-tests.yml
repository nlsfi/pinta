name: Test Integration
on:
  workflow_call:
    inputs:
      component-path:
        required: true
        type: string

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run migrations via docker compose
        run: docker compose run --rm ansible

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --all-groups --all-packages
        working-directory: ${{ inputs.component-path }}

      # The test directory has to be named "test_integration"
      - name: Run integration tests
        run: |
          uv run pytest -v test_integration
        working-directory: ${{ inputs.component-path }}
