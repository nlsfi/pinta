name: Test Integration
on:
  workflow_call:
    inputs:
      component-path:
        required: true
        type: string

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all compose images
        env:
          COMPOSE_PROFILES: "*"
        run: |
          docker buildx bake \
            --file docker-compose.yml \
            --set *.cache-from=type=gha \
            --set *.cache-to=type=gha,mode=max

      - name: Run migrations via docker compose
        run: docker compose run --rm ansible

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --locked --all-groups --all-extras
        working-directory: ${{ inputs.component-path }}

      - name: Copy .env.example to .env
        run: cp .env.example .env

      # The test directory has to be named "test_integration"
      - name: Run tests
        run: |
          uv run pytest -v test_integration
        working-directory: ${{ inputs.component-path }}
