name: Database Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'components/db/**'
      - '.github/workflows/db.yml'
      - '.github/workflows/integration-tests.yml'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'components/db/**'
      - '.github/workflows/db.yml'
      - '.github/workflows/integration-tests.yml'
      - '.github/workflows/unit-tests.yml'

jobs:
  unittests:
    uses: ./.github/workflows/unit-tests.yml
    with:
      component-path: components/db
      test_folder: test_db
