name: Processing Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'components/processing/**'
      - '.github/workflows/processing.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'components/processing/**'
      - '.github/workflows/processing.yml'

jobs:
  unittests:
    uses: ./.github/workflows/unit-tests.yml
    with:
      component-path: components/processing
      test_folder: test_processing
