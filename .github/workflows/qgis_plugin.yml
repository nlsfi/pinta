name: QGIS Plugin Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'components/qgis_plugin/**'
      - '.github/workflows/qgis_plugin.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'components/qgis_plugin/**'
      - '.github/workflows/qgis_plugin.yml'

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    container:
      image: qgis/qgis:${{ matrix.qgis-image-tags }}
    strategy:
      matrix:
        qgis-image-tags: [ "3.44.8-noble", "4.0-questing" ]
      fail-fast: false
    defaults:
      run:
        working-directory: components/qgis_plugin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Python dependencies
        shell: bash
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install uv
          uv sync --active

      - name: Run tests
        run: |
          pytest -v
