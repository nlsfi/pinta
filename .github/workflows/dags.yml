name: DAG Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'components/dags/**'
      - '.github/workflows/dags.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'components/dags/**'
      - '.github/workflows/dags.yml'

jobs:
  unittests:
    uses: ./.github/workflows/unit-tests.yml
    with:
      component-path: components/dags
      test_folder: test_dags
