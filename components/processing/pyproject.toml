[project]
name = "pinta-processing"
# Version can't be dynamic as docker build layer caching breaks
version = "0.0.0"
description = "Processing component of the elevation production system"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "laspy",
  "lazrs",
  "pinta-db[shapely]",
  "affine",
  "rasterio",
]

[project.urls]
Homepage = "https://github.com/nlsfi/pinta"
Repository = "https://github.com/nlsfi/pinta"
Changelog = "https://github.com/nlsfi/pinta/blob/main/components/processing/CHANGELOG.md/"

[project.optional-dependencies]
build = ["uv"]


[tool.uv]
default-groups = ["development", "linting"]

[dependency-groups]
development = [
  # testing
  "pytest",
  "pytest-mock",
  "pytest-dotenv",
  "pytest-xdist",
  "pinta-lib",
  "psycopg[binary]",
]
linting = [
  "prek",
  "mypy",
  "ruff",
]

[tool.uv.sources]
pinta-db = { workspace = true }
pinta-lib = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "pinta_processing"
include = ["py.typed"]

# extend required for isort action to pick up correct config
[tool.ruff]
extend = "../../pyproject.toml"

[tool.pytest.ini_options]
addopts = "--import-mode=importlib -p no:pytest-qgis"

[tool.semantic_release]
commit_parser = "conventional-monorepo"
major_on_zero = false
allow_zero_version = true
commit_message = """\
chore(release): pinta-processing@{version}

Automatically generated by python-semantic-release
"""
tag_format = "pinta-processing-v{version}"
version_toml = ["pyproject.toml:project.version"]
build_command = """
    python -m pip install -e '.[build]'
    rm -f dist
    mkdir -p dist
    uv lock --upgrade-package "$PACKAGE_NAME"
    git add ../../uv.lock
    uv build
    mv ../../dist/pinta_processing* dist/
"""

[tool.semantic_release.commit_parser_options]
path_filters = ["."]
scope_prefix = "processing"

[tool.semantic_release.changelog]
# Recommended patterns for conventional commits parser that is scope aware
exclude_commit_patterns = [
  '''chore(?:\([^)]*?\))?: .+''',
  '''ci(?:\([^)]*?\))?: .+''',
  '''refactor(?:\([^)]*?\))?: .+''',
  '''style(?:\([^)]*?\))?: .+''',
  '''test(?:\([^)]*?\))?: .+''',
  '''build\((?!deps\): .+)''',
  '''Initial [Cc]ommit.*''',
]

[tool.semantic_release.branches.main]
match = "(main|master|release-pipelines)" # TODO: remove this branch name
prerelease_token = "dev"
