[project]
name = "pinta-lib"
version = "0.0.0"
description = "Common library for the project"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
  "pinta-db",
]

[tool.uv]
default-groups = ["dev"]

[dependency-groups]
dev = [
  "pytest>=9.0.2",
]

[tool.uv.sources]
pinta-db = { workspace = true }

[build-system]
requires = ["setuptools>=82", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
pinte_test_utils = ["py.typed"]
