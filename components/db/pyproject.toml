[project]
name = "pinta-db"
version = "0.1.0"
description = "Database component of the elevation production system"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
  "geoalchemy2[shapely]>=0.18.4",
  "sqlmodel>=0.0.37",
]

[tool.uv]
default-groups = ["dev"]

[dependency-groups]
dev = [
  "alembic>=1.18.4",
]
