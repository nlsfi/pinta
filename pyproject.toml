[project]
name = "pinta"
version = "0.0.1"
requires-python = ">=3.12"
dependencies = []

[tool.uv]
default-groups = ["lint"]
package = false

[tool.uv.workspace]
# Do not add components/qgis_plugin here, since it has its own venv created with --system-site-packages.
members = []

[dependency-groups]
lint = [
  "prek==0.3.5",
]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
