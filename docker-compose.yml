services:
  db:
    build:
      context: infra/containers/postgis
      dockerfile: Containerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: localhost/pinta-db:latest
    healthcheck:
      test: pg_isready -U postgres || exit 1
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 30s
    environment:
      POSTGIS_GDAL_ENABLED_DRIVERS: "ENABLE_ALL"
    ports:
      - target: 5432
        published: "${COMPOSE_DB_PORT:-5400}"
        protocol: tcp
        mode: host
    volumes:
      - type: volume
        source: db-data
        target: /pgdata


  ansible:
    profiles:
      - ansible
    depends_on:
      - db
    build:
      context: infra/containers/ansible
      dockerfile: Containerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: localhost/pinta-ansible:latest
    environment:
      ANSIBLE_CONFIG: /ansible/ansible.cfg
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
    working_dir: /ansible
    command:
      - ansible-playbook
      - full.yml
      - -i
      - inventories/local
    volumes:
      - type: bind
        source: ${REPO_DIR:-.}/infra/ansible
        target: /ansible
        read_only: true
      - type: bind
        source: ${REPO_DIR:-.}
        target: /repository
        read_only: true

  processing:
    build:
      context: .
      dockerfile: components/processing/Containerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
    image: localhost/pinta-processing:latest
    volumes:
      - type: bind
        source: ${REPO_DIR:-.}
        target: /code
        read_only: true

volumes:
  db-data:
